<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><base href="/HkHotels.Front/"><title>Consultar Reserva - HK Hotels</title><link rel="stylesheet" href="css/styles.css">
<style>.result-card{background:white;border-radius:12px;padding:24px;margin-top:20px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}.result-card h3{color:var(--gold-primary)}.badge{padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600}.badge-pendiente{background:#FFF3CD;color:#856404}.badge-confirmada{background:#D4EDDA;color:#155724}.badge-cancelada{background:#F8D7DA;color:#721C24}.badge-completada{background:#CCE5FF;color:#004085}</style></head>
<body>
<header class="header" id="header"><nav class="navbar">
<a href="." class="logo"><span class="logo-text">HK<span>Hotels</span></span></a>
<div class="nav-links" id="navLinks"><a href=".">Inicio</a><a href="habitaciones.html">Habitaciones</a><a href="reservas/formulario.html">Reservar</a><a href="reservas/consultar.html" class="active">Consultar</a></div>
<div class="hamburger" id="hamburger"><span></span><span></span><span></span></div></nav></header>
<section class="section" style="padding-top:120px;">
<div class="section-title"><span class="subtitle">Reservas</span><h2>Consultar tu Reserva</h2><div class="section-divider"></div><p>Ingresa tu email para consultar tus reservas</p></div>
<div style="max-width:600px;margin:0 auto;padding:0 20px;">
<form id="form-consultar" style="background:white;padding:32px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);">
<div class="form-group" style="margin-bottom:16px;"><label>Email</label><input type="email" id="email-consulta" required placeholder="tu@email.com" style="color:var(--gray-text);background:var(--gray-light);border:1px solid #ddd;"></div>
<div class="form-group" style="margin-bottom:16px;"><label>Código (opcional)</label><input type="text" id="codigo-consulta" placeholder="HK-XXXXX" style="color:var(--gray-text);background:var(--gray-light);border:1px solid #ddd;"></div>
<button type="submit" class="btn btn-gold" style="width:100%;">Consultar</button></form>
<div id="resultados"></div></div></section>
<footer class="footer" style="margin-top:60px;"><div class="footer-content"><div class="footer-col"><span class="logo-text" style="font-size:24px;">HK<span>Hotels</span></span></div>
<div class="footer-col"><h4>Contacto</h4><p>📞 +34 971 123 456</p></div></div><div class="footer-bottom"><p>&copy; 2026 HK Hotels.</p></div></footer>
<script src="js/api.js"></script>
<script>
document.getElementById('hamburger').addEventListener('click',()=>document.getElementById('navLinks').classList.toggle('active'));
window.addEventListener('scroll',()=>document.getElementById('header').classList.toggle('scrolled',window.scrollY>50));
document.getElementById('form-consultar').addEventListener('submit',async e=>{e.preventDefault();const email=document.getElementById('email-consulta').value;const codigo=document.getElementById('codigo-consulta').value;const c=document.getElementById('resultados');try{const r=await api.consultarReserva(email,codigo||null);if(r.success){c.innerHTML=r.data.map(r=>{const bc=`badge-${r.estado}`;return `<div class="result-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><h3>Código: ${r.codigo_unico}</h3><span class="badge ${bc}">${r.estado}</span></div><div class="detail"><span>Cliente</span><span>${r.nombre_cliente}</span></div><div class="detail"><span>Habitación</span><span>${r.habitacion_nombre}</span></div><div class="detail"><span>Check-in</span><span>${r.fecha_checkin}</span></div><div class="detail"><span>Check-out</span><span>${r.fecha_checkout}</span></div><div class="detail"><span>Huéspedes</span><span>${r.huespedes}</span></div><div class="detail"><span>Total</span><span style="font-weight:700;color:var(--gold-primary);">$${r.precio_total}</span></div></div>`}).join('')}else{c.innerHTML='<div class="result-card"><p style="text-align:center;color:var(--gray-medium);">No se encontraron reservas.</p></div>'}}catch(error){c.innerHTML='<div class="result-card"><p style="text-align:center;color:red;">Error</p></div>'}});
</script></body></html>
