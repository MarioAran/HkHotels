<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Editar Habitación - HK Hotels</title><link rel="stylesheet" href="/css/styles.css">
<style>.admin-layout{display:flex}.admin-sidebar{width:260px;background:var(--black-soft);padding:24px;position:fixed;top:0;left:0;height:100vh}.admin-sidebar .logo-text{font-size:22px;display:block;margin-bottom:32px}.admin-sidebar nav a{display:block;color:rgba(255,255,255,0.7);padding:12px 16px;border-radius:8px;margin-bottom:4px;font-size:14px}.admin-sidebar nav a:hover,.admin-sidebar nav a.active{background:rgba(198,164,63,0.15);color:var(--gold-primary)}.admin-main{margin-left:260px;flex:1;padding:32px;background:var(--ivory);min-height:100vh}.form-card{background:white;border-radius:12px;padding:32px;max-width:600px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}.form-card .form-group{margin-bottom:16px}.form-card label{display:block;font-size:13px;font-weight:600;color:var(--gray-text);margin-bottom:4px}.form-card input,.form-card textarea{width:100%;padding:10px 14px;border:2px solid #eee;border-radius:8px;font-size:14px;color:var(--gray-text)}.form-card input:focus,.form-card textarea:focus{border-color:var(--gold-primary);outline:none}</style></head>
<body>
<div class="admin-layout">
<aside class="admin-sidebar">
<span class="logo-text">HK<span>Hotels</span></span>
<nav>
<a href="/admin/dashboard.html">📊 Dashboard</a>
<a href="/admin/habitaciones/listar.html" class="active">🏨 Habitaciones</a>
<a href="/admin/reservas/listar.html">📋 Reservas</a>
<a href="/admin/servicios/listar.html">🛎️ Servicios</a>
<a href="/" style="margin-top:32px;border-top:1px solid rgba(255,255,255,0.1);padding-top:16px;">← Ver Sitio</a>
<a href="#" id="btn-cerrar-sesion" style="color:#dc3545;">🚪 Cerrar Sesión</a>
</nav></aside>
<main class="admin-main"><h1 style="margin-bottom:24px;">Editar Habitación</h1>
<div class="form-card">
<form id="form-editar">
<div class="form-group"><label>Nombre</label><input type="text" id="nombre" required></div>
<div class="form-group"><label>Precio por Noche ($)</label><input type="number" id="precio_noche" step="0.01" required></div>
<div class="form-group"><label>Máx. Personas</label><input type="number" id="max_personas" min="1" required></div>
<div class="form-group"><label>Descripción</label><textarea id="descripcion" rows="3"></textarea></div>
<div class="form-group"><label>URL Imagen</label><input type="url" id="imagen_url"></div>
<div class="form-group"><label>Activa</label><select id="activa"><option value="true">Sí</option><option value="false">No</option></select></div>
<button type="submit" class="btn btn-gold">Guardar Cambios</button>
<a href="/admin/habitaciones/listar.html" class="btn btn-outline" style="margin-left:10px;">Cancelar</a>
</form></div></main></div>
<script src="/js/api.js"></script>
<script>
const token=localStorage.getItem('hk_hotel_token');if(!token)window.location.href='/admin/login.html';
document.getElementById('btn-cerrar-sesion').addEventListener('click',e=>{e.preventDefault();localStorage.clear();window.location.href='/admin/login.html';});
const params=new URLSearchParams(window.location.search);const id=params.get('id');

async function cargar(){
try{
const data=await api.getHabitacionesAdmin(token);
const hab=data.data.find(h=>h.id==id);
if(hab){
document.getElementById('nombre').value=hab.nombre;
document.getElementById('precio_noche').value=hab.precio_noche;
document.getElementById('max_personas').value=hab.max_personas;
document.getElementById('descripcion').value=hab.descripcion||'';
document.getElementById('imagen_url').value=hab.imagen_url||'';
document.getElementById('activa').value=hab.activa?'true':'false';
}
}catch(e){alert('Error al cargar datos');}
}

document.getElementById('form-editar').addEventListener('submit',async e=>{
e.preventDefault();const btn=e.target.querySelector('button');btn.textContent='Guardando...';btn.disabled=true;
try{
const result=await api.actualizarHabitacion(id,{
nombre:document.getElementById('nombre').value,
precio_noche:parseFloat(document.getElementById('precio_noche').value),
max_personas:parseInt(document.getElementById('max_personas').value),
descripcion:document.getElementById('descripcion').value,
imagen_url:document.getElementById('imagen_url').value,
activa:document.getElementById('activa').value==='true'
},token);
if(result.success){alert('✅ Guardado');window.location.href='/admin/habitaciones/listar.html';}
else alert('Error: '+result.message);
}catch(e){alert('Error al guardar');}
finally{btn.textContent='Guardar Cambios';btn.disabled=false;}
});
cargar();
</script></body></html>
