<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><base href="/HkHotels/"><title>Redirigiendo - HK Hotels Admin</title><link rel="stylesheet" href="css/styles.css">
<style>.redirect-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--black-soft),#2A2A2A);text-align:center;padding:40px 20px}.redirect-card{background:white;border-radius:16px;padding:60px 40px;max-width:400px;box-shadow:0 20px 40px rgba(0,0,0,0.3)}.spinner{width:40px;height:40px;border:4px solid rgba(198,164,63,0.2);border-top-color:var(--gold-primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px}@keyframes spin{to{transform:rotate(360deg)}}</style></head>
<body>
<div class="redirect-page"><div class="redirect-card">
<div class="spinner"></div>
<h2 style="color:var(--black-soft);margin-bottom:12px;">Redirigiendo...</h2>
<p style="color:var(--gray-medium);">Accediendo al panel de administración</p>
</div></div>
<script>
var token = localStorage.getItem('hk_hotel_token');
if (token) {
  window.location.href = '/HkHotels/admin/dashboard.html';
} else {
  window.location.href = '/HkHotels/admin/login.html';
}
</script>
</body></html>
