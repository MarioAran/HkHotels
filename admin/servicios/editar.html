<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><base href="/HkHotels/"><title>Editar Servicio - Admin</title><link rel="stylesheet" href="css/styles.css">
<style>.admin-layout{display:flex}.admin-sidebar{width:260px;background:var(--black-soft);padding:24px;position:fixed;top:0;left:0;height:100vh}.admin-sidebar .logo-text{font-size:22px;display:block;margin-bottom:32px}.admin-sidebar nav a{display:block;color:rgba(255,255,255,0.7);padding:12px 16px;border-radius:8px;margin-bottom:4px;font-size:14px}.admin-sidebar nav a:hover,.admin-sidebar nav a.active{background:rgba(198,164,63,0.15);color:var(--gold-primary)}.admin-main{margin-left:260px;flex:1;padding:32px;background:var(--ivory)}.form-card{background:white;border-radius:12px;padding:32px;max-width:600px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}.form-card .form-group{margin-bottom:16px}.form-card label{display:block;font-size:13px;font-weight:600;margin-bottom:4px}.form-card input,.form-card textarea,.form-card select{width:100%;padding:10px 14px;border:2px solid #eee;border-radius:8px;font-size:14px;color:var(--gray-text)}</style></head>
<body><div class="admin-layout"><aside class="admin-sidebar">
<span class="logo-text">HK<span>Hotels</span></span>
<nav><a href="admin/dashboard.html">📊 Dashboard</a><a href="admin/habitaciones/listar.html">🏨 Habitaciones</a><a href="admin/reservas/listar.html">📋 Reservas</a><a href="admin/servicios/listar.html" class="active">🛎️ Servicios</a><a href="." style="margin-top:32px;border-top:1px solid rgba(255,255,255,0.1);padding-top:16px;">← Ver Sitio</a><a href="#" id="btn-cerrar-sesion" style="color:#dc3545;">🚪 Cerrar Sesión</a></nav></aside>
<main class="admin-main"><h1 style="margin-bottom:24px;">Editar Servicio</h1>
<div class="form-card"><form id="form-editar">
<div class="form-group"><label>Nombre</label><input type="text" id="nombre" required></div>
<div class="form-group"><label>Descripción</label><textarea id="descripcion" rows="3"></textarea></div>
<div class="form-group"><label>Precio Adicional ($)</label><input type="number" id="precio_adicional" step="0.01" min="0"></div>
<div class="form-group"><label>Activo</label><select id="activo"><option value="true">Sí</option><option value="false">No</option></select></div>
<button type="submit" class="btn btn-gold">Guardar</button>
<a href="admin/servicios/listar.html" class="btn btn-outline" style="margin-left:10px;">Cancelar</a>
</form></div></main></div>
<script src="js/config.js"></script>
    <script src="js/api.js"></script>
<script>
const token=localStorage.getItem('hk_hotel_token');if(!token)location.href='../login.html';
document.getElementById('btn-cerrar-sesion').addEventListener('click',e=>{e.preventDefault();localStorage.clear();location.href='../login.html';});
const id=new URLSearchParams(window.location.search).get('id');
async function cargar(){try{const d=await api.getServiciosAdmin(token);const s=d.data.find(x=>x.id==id);if(s){document.getElementById('nombre').value=s.nombre;document.getElementById('descripcion').value=s.descripcion||'';document.getElementById('precio_adicional').value=s.precio_adicional;document.getElementById('activo').value=s.activo?'true':'false'}}catch(e){alert('Error')}}
document.getElementById('form-editar').addEventListener('submit',async e=>{e.preventDefault();const btn=e.target.querySelector('button');btn.textContent='Guardando...';btn.disabled=true;try{const r=await api.actualizarServicio(id,{nombre:document.getElementById('nombre').value,descripcion:document.getElementById('descripcion').value,precio_adicional:parseFloat(document.getElementById('precio_adicional').value),activo:document.getElementById('activo').value==='true'},token);if(r.success){alert('✅ Guardado');location.href='listar.html'}else alert('Error: '+r.message)}catch(e){alert('Error')}finally{btn.textContent='Guardar';btn.disabled=false}});
cargar();
</script></body></html>
