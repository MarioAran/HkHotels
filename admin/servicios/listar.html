<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><base href="/HkHotels/"><title>Servicios Admin - HK Hotels</title><link rel="stylesheet" href="css/styles.css">
<style>.admin-layout{display:flex}.admin-sidebar{width:260px;background:var(--black-soft);padding:24px;position:fixed;top:0;left:0;height:100vh}.admin-sidebar .logo-text{font-size:22px;display:block;margin-bottom:32px}.admin-sidebar nav a{display:block;color:rgba(255,255,255,0.7);padding:12px 16px;border-radius:8px;margin-bottom:4px;font-size:14px}.admin-sidebar nav a:hover,.admin-sidebar nav a.active{background:rgba(198,164,63,0.15);color:var(--gold-primary)}.admin-main{margin-left:260px;flex:1;padding:32px;background:var(--ivory);min-height:100vh}</style></head>
<body><div class="admin-layout"><aside class="admin-sidebar">
<span class="logo-text">HK<span>Hotels</span></span>
<nav><a href="admin/dashboard.html">📊 Dashboard</a><a href="admin/habitaciones/listar.html">🏨 Habitaciones</a><a href="admin/reservas/listar.html">📋 Reservas</a><a href="admin/servicios/listar.html" class="active">🛎️ Servicios</a><a href="." style="margin-top:32px;border-top:1px solid rgba(255,255,255,0.1);padding-top:16px;">← Ver Sitio</a><a href="#" id="btn-cerrar-sesion" style="color:#dc3545;">🚪 Cerrar Sesión</a></nav></aside>
<main class="admin-main">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;"><h1 style="font-size:24px;color:var(--black-soft);">Servicios</h1><a href="admin/servicios/crear.html" class="btn btn-gold btn-sm">+ Nuevo</a></div>
<div style="background:white;border-radius:12px;padding:24px;box-shadow:0 4px 6px rgba(0,0,0,0.1);overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Precio</th><th>Activo</th><th>Acciones</th></tr></thead><tbody id="servicios-body"></tbody></table></div></main></div>
<script src="js/api.js"></script>
<script>
const token=localStorage.getItem('hk_hotel_token');if(!token)location.href='../login.html';
document.getElementById('btn-cerrar-sesion').addEventListener('click',e=>{e.preventDefault();localStorage.clear();location.href='../login.html';});
async function cargar(){try{const d=await api.getServiciosAdmin(token);if(d.success){document.getElementById('servicios-body').innerHTML=d.data.map(s=>`<tr><td>${s.id}</td><td><strong>${s.nombre}</strong></td><td>${s.descripcion||'-'}</td><td>${s.precio_adicional>0?'$'+s.precio_adicional:'Gratis'}</td><td>${s.activo?'✅':'❌'}</td><td><a href="admin/servicios/editar.html?id=${s.id}" class="btn btn-sm btn-outline" style="padding:6px 12px;font-size:12px;">✏️</a> <button onclick="eliminar(${s.id})" class="btn btn-sm btn-dark" style="padding:6px 12px;font-size:12px;background:#dc3545;">🗑️</button></td></tr>`).join('')}}catch(e){document.getElementById('servicios-body').innerHTML='<tr><td colspan="6" style="text-align:center;color:red;">Error</td></tr>'}}
async function eliminar(id){if(!confirm('¿Desactivar?'))return;try{await api.eliminarServicio(id,token);cargar()}catch(e){alert('Error')}}
cargar();
</script></body></html>
