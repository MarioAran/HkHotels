<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><base href="/HkHotels/"><title>Reservas Admin - HK Hotels</title><link rel="stylesheet" href="css/styles.css">
<style>.admin-layout{display:flex}.admin-sidebar{width:260px;background:var(--black-soft);padding:24px;position:fixed;top:0;left:0;height:100vh}.admin-sidebar .logo-text{font-size:22px;display:block;margin-bottom:32px}.admin-sidebar nav a{display:block;color:rgba(255,255,255,0.7);padding:12px 16px;border-radius:8px;margin-bottom:4px;font-size:14px}.admin-sidebar nav a:hover,.admin-sidebar nav a.active{background:rgba(198,164,63,0.15);color:var(--gold-primary)}.admin-main{margin-left:260px;flex:1;padding:32px;background:var(--ivory)}.badge{padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600}.badge-pendiente{background:#FFF3CD;color:#856404}.badge-confirmada{background:#D4EDDA;color:#155724}.badge-cancelada{background:#F8D7DA;color:#721C24}.badge-completada{background:#CCE5FF;color:#004085}</style></head>
<body><div class="admin-layout"><aside class="admin-sidebar">
<span class="logo-text">HK<span>Hotels</span></span>
<nav><a href="../dashboard.html">📊 Dashboard</a><a href="../habitaciones/listar.html">🏨 Habitaciones</a><a href="listar.html" class="active">📋 Reservas</a><a href="../servicios/listar.html">🛎️ Servicios</a><a href="../.." style="margin-top:32px;border-top:1px solid rgba(255,255,255,0.1);padding-top:16px;">← Ver Sitio</a><a href="#" id="btn-cerrar-sesion" style="color:#dc3545;">🚪 Cerrar Sesión</a></nav></aside>
<main class="admin-main"><h1 style="margin-bottom:24px;">Todas las Reservas</h1>
<div style="background:white;border-radius:12px;padding:24px;box-shadow:0 4px 6px rgba(0,0,0,0.1);overflow-x:auto;">
<table style="width:100%;border-collapse:collapse;"><thead><tr><th>Código</th><th>Cliente</th><th>Email</th><th>Habitación</th><th>Check-in</th><th>Check-out</th><th>Total</th><th>Estado</th></tr></thead>
<tbody id="reservas-body"></tbody></table></div></main></div>
<script src="../../js/api.js"></script>
<script>
const token=localStorage.getItem('hk_hotel_token');if(!token)location.href='../login.html';
document.getElementById('btn-cerrar-sesion').addEventListener('click',e=>{e.preventDefault();localStorage.clear();location.href='../login.html';});
const es={pendiente:'badge-pendiente',confirmada:'badge-confirmada',cancelada:'badge-cancelada',completada:'badge-completada'};
async function cargar(){try{const d=await api.getReservasAdmin(token);if(d.success){document.getElementById('reservas-body').innerHTML=d.data.map(r=>`<tr><td><strong>${r.codigo_unico}</strong></td><td>${r.nombre_cliente}</td><td>${r.email}</td><td>${r.habitacion_nombre}</td><td>${r.fecha_checkin}</td><td>${r.fecha_checkout}</td><td>$${r.precio_total}</td><td><span class="badge ${es[r.estado]||''}">${r.estado}</span></td></tr>`).join('')}}catch(e){document.getElementById('reservas-body').innerHTML='<tr><td colspan="8" style="text-align:center;color:red;">Error</td></tr>'}}
cargar();
</script></body></html>
