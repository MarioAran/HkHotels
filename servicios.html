<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><base href="/HkHotels.Front/"><title>Servicios - HK Hotels</title><link rel="stylesheet" href="css/styles.css"></head>
<body>
<header class="header" id="header"><nav class="navbar">
<a href="." class="logo"><span class="logo-text">HK<span>Hotels</span></span></a>
<div class="nav-links" id="navLinks">
<a href=".">Inicio</a><a href="habitaciones.html">Habitaciones</a><a href="servicios.html" class="active">Servicios</a><a href="galeria.html">Galería</a><a href="contacto.html">Contacto</a><a href="reservas/formulario.html" class="btn btn-gold btn-sm">Reservar</a>
</div><div class="hamburger" id="hamburger"><span></span><span></span><span></span></div></nav></header>
<section class="section" style="padding-top:120px;background:var(--white);">
<div class="section-title"><span class="subtitle">Servicios Exclusivos</span><h2>Experiencias Premium</h2><div class="section-divider"></div><p>Todo lo que necesitas para una estancia inolvidable</p></div>
<div class="services-grid" id="services-container"></div></section>
<footer class="footer"><div class="footer-content"><div class="footer-col"><span class="logo-text" style="font-size:24px;">HK<span>Hotels</span></span></div>
<div class="footer-col"><h4>Contacto</h4><p>📞 +34 971 123 456</p></div></div><div class="footer-bottom"><p>&copy; 2026 HK Hotels.</p></div></footer>
<script src="js/api.js"></script>
<script>
document.getElementById('hamburger').addEventListener('click',()=>document.getElementById('navLinks').classList.toggle('active'));
window.addEventListener('scroll',()=>document.getElementById('header').classList.toggle('scrolled',window.scrollY>50));
async function cargarServicios(){const icons=['💆','🍽️','🚗','🍳','⛵','🎵','🏊','🧘'];try{const d=await api.getServicios();if(d.success){document.getElementById('services-container').innerHTML=d.data.map((s,i)=>`<div class="service-card fade-in"><div class="service-icon">${icons[i%icons.length]}</div><h3>${s.nombre}</h3><p>${s.descripcion}</p>${s.precio_adicional>0?`<span class="price-tag">+$${s.precio_adicional}</span>`:'<span class="price-tag" style="background:var(--gray-light);color:var(--gray-text);">Incluido</span>'}</div>`).join('');}}catch(e){document.getElementById('services-container').innerHTML='<p style="text-align:center;grid-column:1/-1;">Error</p>';}}
cargarServicios();
</script></body></html>
