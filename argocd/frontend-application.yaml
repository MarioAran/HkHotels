apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hk-hotels-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MarioAran/HkHotels.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: hk-hotels
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m